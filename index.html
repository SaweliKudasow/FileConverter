<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dateikonverter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Dateikonverter</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Datei hierher ziehen oder zum Auswählen klicken</div>
            <input type="file" id="fileInput" class="file-input">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
        </div>

        <div class="error" id="error"></div>

        <div class="conversion-options" id="conversionOptions">
            <div class="option-group">
                <label for="targetFormat">Zielformat für die Konvertierung wählen:</label>
                <select id="targetFormat"></select>
            </div>
            <button class="convert-btn" id="convertBtn">Konvertieren</button>
        </div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="download-area" id="downloadArea">
            <a href="#" class="download-btn" id="downloadBtn" download>Konvertierte Datei herunterladen</a>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
